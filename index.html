<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="WEBLIFT Studio — Agencia peruana de diseño y desarrollo web."/>
  <title>WEBLIFT Studio — We Build, You Grow</title>
  
  <link rel="stylesheet" href="assets/css/global.css"/>
  <link rel="stylesheet" href="assets/css/intro.css"/>
</head>
<body>

<!-- ═══════════ PANTALLA DE INTRO CON ANIMACIÓN DEL LOGO ═══════════ -->
<div id="intro-screen">

  <!-- Líneas de escaneo decorativas -->
  <div class="intro-lines">
    <div class="intro-line"></div>
    <div class="intro-line"></div>
    <div class="intro-line"></div>
  </div>

  <!-- Partículas (se generan con JS) -->
  <div class="intro-particles"></div>

  <!-- Logo + marca -->
  <div class="intro-logo-wrap">
    <!--
      IMPORTANTE: Reemplaza "assets/images/logo.png" con tu logo real.
      El logo debe ser PNG con fondo transparente para verse bien
      sobre el fondo navy oscuro.
    -->
    <img
      src="assets/images/logo.png"
      alt="WEBLIFT Studio Logo"
      class="intro-logo"
    />
    <div class="intro-brand">WEB<span>LIFT</span></div>
    <div class="intro-slogan">We Build, You Grow</div>
    <div class="intro-loader">
      <div class="intro-loader-bar"></div>
    </div>
  </div>

</div>

<!-- Firebase SDKs (versión compat para uso sin módulos) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Configuración y servicios -->
<script src="js/config/firebase-config.js"></script>
<script src="js/services/auth-service.js"></script>
<!-- UI — en este orden exacto -->
<script src="../js/ui/intro.js"></script>
<script src="../js/ui/navbar.js"></script>
<script src="../js/ui/animations.js"></script>
<script src="js/ui/main.js"></script>

<script>
  // Redirigir a la página principal después de la animación (3.2s)
  setTimeout(() => {
    window.location.href = "pages/home.html";
  }, 3200);
</script>

</body>
</html>
